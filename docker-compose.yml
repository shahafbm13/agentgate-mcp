services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentgate
      POSTGRES_PASSWORD: agentgate
      POSTGRES_DB: agentgate
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentgate -d agentgate"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-auth:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: npm run mock-auth:dev
    environment:
      MOCK_AUTH_PORT: 9000
      JWT_ISSUER: http://localhost:9000
      JWT_AUDIENCE: http://localhost:3000/mcp
    ports:
      - "9000:9000"
    volumes:
      - mock_auth_keys:/app/mock-auth-server/keys

  notification-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: npm run notification-api:dev
    environment:
      NOTIFICATION_API_PORT: 9001
      NOTIFICATION_API_KEY: dev-notification-key
    ports:
      - "9001:9001"

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: sh -c "npm run db:migrate && npm run db:seed && exec npm run dev:http"
    environment:
      DATABASE_URL: postgresql://agentgate:agentgate@postgres:5432/agentgate
      PORT: 3000
      TRANSPORT: http
      MCP_RESOURCE_URI: http://localhost:3000/mcp
      BASE_URL: http://localhost:3000
      JWT_ISSUER: http://localhost:9000
      JWT_AUDIENCE: http://localhost:3000/mcp
      JWKS_URI: http://mock-auth:9000/.well-known/jwks.json
      AUTH_SERVER_URL: http://localhost:9000
      NOTIFICATION_API_URL: http://notification-api:9001
      NOTIFICATION_API_KEY: dev-notification-key
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      mock-auth:
        condition: service_started
      notification-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mock_auth_keys:
